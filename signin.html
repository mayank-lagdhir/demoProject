<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | IronCore</title>
  <link rel="stylesheet" href="minimal.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <nav>
      <div class="logo">
        <img src="heron-air-compressors.jpg" alt="IronCore Equipment" class="logo-img">
      </div>
      <button class="menu-toggle" aria-label="Menu"><i class="fas fa-bars"></i></button>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="#">Products</a>
        <a href="#">Services</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
        <div class="auth-buttons">
          <a href="signin.html" class="btn-outline">Sign In</a>
          <a href="signup.html" class="btn-solid">Sign Up</a>
        </div>
      </div>
    </nav>
  </header>

  <main>
    <div class="form-container">
      <h2>Sign In</h2>
      <form>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <div class="forgot-password">
          <a href="#">Forgot password?</a>
        </div>
        <button type="submit" class="btn-solid">Sign In</button>
      </form>

      <div class="social-divider">
        <span>or sign in with</span>
      </div>

      <div class="social-buttons">
        <a href="#" class="btn-social"><i class="fab fa-google"></i> Google</a>
        <a href="#" class="btn-social"><i class="fab fa-microsoft"></i> Microsoft</a>
        <a href="#" class="btn-social"><i class="fab fa-apple"></i> Apple</a>
      </div>

      <div class="form-footer">
        Don't have an account? <a href="signup.html">Sign up</a>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 IronCore Equipment. All rights reserved. <a href="#">Privacy</a> | <a href="#">Terms</a></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
